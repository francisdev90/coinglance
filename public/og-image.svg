<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Subtle radial glow behind text -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1E3A5F" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0A1628" stop-opacity="0"/>
    </radialGradient>
    <!-- Gold gradient for headline accent -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4A545"/>
      <stop offset="100%" stop-color="#F0C060"/>
    </linearGradient>
  </defs>

  <!-- ── Background ── -->
  <rect width="1200" height="630" fill="#0A1628"/>

  <!-- Subtle dot-grid (same as hero section) -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="0.5" cy="0.5" r="0.8" fill="#D4A545" opacity="0.12"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Radial glow behind center text -->
  <ellipse cx="600" cy="315" rx="480" ry="240" fill="url(#glow)"/>

  <!-- ── Decorative background chart line (very subtle) ── -->
  <polyline
    points="0,520 120,490 200,510 320,440 420,460 520,380 620,400 720,310 820,330 900,250 1000,270 1100,200 1200,220"
    stroke="#D4A545"
    stroke-width="1.5"
    fill="none"
    opacity="0.08"
  />
  <!-- Second layer slightly offset -->
  <polyline
    points="0,560 150,530 280,545 380,480 500,500 620,420 750,440 860,360 960,375 1080,295 1200,310"
    stroke="#1E3A5F"
    stroke-width="1"
    fill="none"
    opacity="0.25"
  />

  <!-- ── Gold accent bar, left edge ── -->
  <rect x="0" y="0" width="4" height="630" fill="#D4A545" opacity="0.9"/>

  <!-- ── Top-left: Logo mark + wordmark ── -->
  <!-- Badge -->
  <rect x="48" y="44" width="52" height="52" rx="10" fill="#1E3A5F"/>
  <!-- Eye mark at (48+6, 44+6) = (54, 50), scaled ~1.5x from 32px design → 48px mark -->
  <g transform="translate(54 50) scale(1.5)">
    <path
      d="M2 16C5.5 7.5 10.5 3 16 3C21.5 3 26.5 7.5 30 16C26.5 24.5 21.5 29 16 29C10.5 29 5.5 24.5 2 16Z"
      stroke="#D4A545"
      stroke-width="2.5"
      stroke-linejoin="round"
      fill="none"
    />
    <rect x="8.5"  y="19"   width="4" height="5.5" rx="1.5" fill="#D4A545"/>
    <rect x="14"   y="14.5" width="4" height="10"  rx="1.5" fill="#D4A545"/>
    <rect x="19.5" y="10.5" width="4" height="14"  rx="1.5" fill="#D4A545"/>
  </g>
  <!-- Wordmark "CoinGlance" -->
  <text
    x="114"
    y="78"
    font-family="'Inter', 'Helvetica Neue', 'Arial', sans-serif"
    font-size="26"
    font-weight="600"
    letter-spacing="-0.5"
    fill="#F1F5F9"
  >CoinGlance</text>

  <!-- ── Tagline chip ── -->
  <rect x="48" y="108" width="202" height="24" rx="12" fill="#1E3A5F"/>
  <text
    x="149"
    y="124"
    text-anchor="middle"
    font-family="'Inter', 'Helvetica Neue', 'Arial', sans-serif"
    font-size="11"
    font-weight="500"
    letter-spacing="1.5"
    fill="#D4A545"
  >LIVE · CRYPTO · MARKETS</text>

  <!-- ── Main headline (centered vertically) ── -->
  <text
    x="600"
    y="285"
    text-anchor="middle"
    font-family="'Inter', 'Helvetica Neue', 'Arial', sans-serif"
    font-size="80"
    font-weight="700"
    letter-spacing="-2"
    fill="#F1F5F9"
  >Live Crypto Markets</text>
  <text
    x="600"
    y="378"
    text-anchor="middle"
    font-family="'Inter', 'Helvetica Neue', 'Arial', sans-serif"
    font-size="80"
    font-weight="700"
    letter-spacing="-2"
    fill="url(#goldGrad)"
  >at a Glance.</text>

  <!-- ── Subtitle stats row ── -->
  <!-- Dot separator -->
  <circle cx="465" cy="430" r="3" fill="#D4A545" opacity="0.5"/>
  <circle cx="600" cy="430" r="3" fill="#D4A545" opacity="0.5"/>
  <circle cx="735" cy="430" r="3" fill="#D4A545" opacity="0.5"/>
  <text x="330" y="436" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="500" fill="#94A3B8">1,000+ Coins</text>
  <text x="530" y="436" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="500" fill="#94A3B8">12 Currencies</text>
  <text x="662" y="436" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="500" fill="#94A3B8">6+ Exchanges</text>
  <text x="850" y="436" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="500" fill="#94A3B8">Always Free</text>

  <!-- ── Divider ── -->
  <rect x="48" y="560" width="1104" height="1" fill="#1E3A5F" opacity="0.8"/>

  <!-- ── Bottom-right domain ── -->
  <text
    x="1152"
    y="596"
    text-anchor="end"
    font-family="'Inter', 'Helvetica Neue', 'Arial', sans-serif"
    font-size="16"
    font-weight="500"
    letter-spacing="0.5"
    fill="#D4A545"
    opacity="0.8"
  >coinglance.app</text>

  <!-- ── Bottom-left: "Free. Always." ── -->
  <text
    x="52"
    y="596"
    font-family="'Inter', 'Helvetica Neue', 'Arial', sans-serif"
    font-size="14"
    font-weight="400"
    fill="#475569"
  >Not financial advice · Data from CoinGecko, Binance, Alternative.me</text>
</svg>
