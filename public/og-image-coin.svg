<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!--
    CoinGlance — Per-coin OG image template
    Replace [COIN_NAME], [COIN_SYMBOL], [COIN_PRICE], [COIN_CHANGE], [CHANGE_COLOR]
    This template is used by /coin/[symbol] when the page is shared.
  -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1E3A5F" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0A1628" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4A545"/>
      <stop offset="100%" stop-color="#F0C060"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0A1628"/>
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="0.5" cy="0.5" r="0.8" fill="#D4A545" opacity="0.10"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <ellipse cx="600" cy="315" rx="480" ry="240" fill="url(#glow)"/>

  <!-- Subtle chart background decoration -->
  <polyline
    points="0,520 120,490 200,510 320,440 420,460 520,380 620,400 720,310 820,330 900,250 1000,270 1100,200 1200,220"
    stroke="#D4A545" stroke-width="1" fill="none" opacity="0.07"
  />

  <!-- Gold left accent bar -->
  <rect x="0" y="0" width="4" height="630" fill="#D4A545" opacity="0.9"/>

  <!-- Top-left: CoinGlance brand -->
  <rect x="48" y="44" width="44" height="44" rx="8" fill="#1E3A5F"/>
  <g transform="translate(53 49) scale(1.25)">
    <path d="M2 16C5.5 7.5 10.5 3 16 3C21.5 3 26.5 7.5 30 16C26.5 24.5 21.5 29 16 29C10.5 29 5.5 24.5 2 16Z"
      stroke="#D4A545" stroke-width="2.5" stroke-linejoin="round" fill="none"/>
    <rect x="8.5"  y="19"   width="4" height="5.5" rx="1.5" fill="#D4A545"/>
    <rect x="14"   y="14.5" width="4" height="10"  rx="1.5" fill="#D4A545"/>
    <rect x="19.5" y="10.5" width="4" height="14"  rx="1.5" fill="#D4A545"/>
  </g>
  <text x="104" y="72" font-family="'Inter','Helvetica Neue',Arial,sans-serif"
    font-size="20" font-weight="600" fill="#F1F5F9" opacity="0.7">CoinGlance</text>

  <!-- Coin symbol badge (top-right area) -->
  <rect x="980" y="44" width="172" height="44" rx="8" fill="#1E3A5F"/>
  <text x="1066" y="72" text-anchor="middle"
    font-family="'Inter','Helvetica Neue',Arial,sans-serif"
    font-size="18" font-weight="700" letter-spacing="2"
    fill="#D4A545">
    [COIN_SYMBOL]
  </text>

  <!-- Coin name — large -->
  <text x="600" y="250" text-anchor="middle"
    font-family="'Inter','Helvetica Neue',Arial,sans-serif"
    font-size="88" font-weight="700" letter-spacing="-2"
    fill="#F1F5F9">
    [COIN_NAME]
  </text>

  <!-- Price -->
  <text x="600" y="345" text-anchor="middle"
    font-family="'Inter','Helvetica Neue',Arial,sans-serif"
    font-size="52" font-weight="700" letter-spacing="-1"
    fill="url(#goldGrad)">
    [COIN_PRICE]
  </text>

  <!-- 24h change chip -->
  <rect x="516" y="370" width="168" height="38" rx="19" fill="#1E3A5F"/>
  <text x="600" y="394" text-anchor="middle"
    font-family="'Inter','Helvetica Neue',Arial,sans-serif"
    font-size="16" font-weight="600"
    fill="[CHANGE_COLOR]">
    [COIN_CHANGE] (24h)
  </text>

  <!-- Sub-label -->
  <text x="600" y="453" text-anchor="middle"
    font-family="'Inter','Helvetica Neue',Arial,sans-serif"
    font-size="16" fill="#475569">
    Live price · Charts · Buy on trusted exchanges
  </text>

  <!-- Divider + bottom -->
  <rect x="48" y="560" width="1104" height="1" fill="#1E3A5F" opacity="0.6"/>
  <text x="1152" y="596" text-anchor="end"
    font-family="'Inter','Helvetica Neue',Arial,sans-serif"
    font-size="15" font-weight="500" fill="#D4A545" opacity="0.7">
    coinglance.app
  </text>
  <text x="52" y="596"
    font-family="'Inter','Helvetica Neue',Arial,sans-serif"
    font-size="13" fill="#475569">
    Not financial advice. Data from CoinGecko.
  </text>
</svg>
